      <script>
        // TODO:
        // Ná í gögning og birta nöfn ásamt netföngum

        async function getUsers() {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/users",
          );
          // Prentast svone ef við gerum ekki json
          console.log("Response áður en við breytum í json", response);
          // Breytum response í json gögn
          const users = await response.json();
          console.log("Response eftir að við breytum í json", users);
          // Ná í lista <ul> þar sem við ætlum að birta gögnin
          const list = document.getElementById("user-list");
          // Fara í gegnum all users og gera li fyrir hvern user
          users.forEach((user) => {
            //Búa til <li>
            const li = document.createElement("li");
            //Bætum við nafni inn í li <li>NAFN</li>
            li.textContent = "$(user.name) - $(user.email)";
            //bætum li in i ul svo ´það birtist á sið'unni
            list.appendChild(li);
          });
          status.textContent = "";
        }
        // MJÖG MIKILVÆGT AÐ KALLA FALLIÐ ANNARS KEYRIR KODINN EKKI
        getUsers();
      </script>
